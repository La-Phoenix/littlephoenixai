    <!-- Main flame shape -->
    <path d="M 0 -12 C -6 -4 -8 2 -8 6 C -8 12 -4 16 0 16 C 4 16 8 12 8 6 C 8 2 6 -4 0 -12 Z" fill="white" opacity="0.95"/>
    
    <!-- Inner flame highlight -->
    <path d="M -2 -4 C -4 0 -4 4 -2 8 C 0 10 2 11 3 8 C 4 4 4 0 2 -4 C 0 -3 -1 -3 -2 -4 Z" fill="rgba(255, 255, 255, 0.6)"/>
